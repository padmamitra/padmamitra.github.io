                <p class="date">2026年5月17日</p>
                <p>最近我看完了《宋殇：岳飞与赵构》。我小时候看过《说岳全传》很多遍，我对岳飞的印象都来自于这本小说，我知道真实的历史和小说有不少差距。《宋殇》此书里全是赵构和岳飞往来的诏书、奏折这些第一手史料，作者不设预定框架，不作道德评判，只求陈述细节，复原历史，让读者在历史的重构中自主寻找答案。</p>

<script>
// 隐藏的访问计数逻辑（不在页面显示，仅在控制台输出）
document.addEventListener('DOMContentLoaded', function() {
    // 从本地存储获取已有计数（首次访问则为0）
    let visitCount = localStorage.getItem('visitCount');
    visitCount = visitCount ? parseInt(visitCount, 10) : 0;
    
    // 计数+1并保存
    visitCount++;
    localStorage.setItem('visitCount', visitCount);
    
    // 仅在浏览器控制台输出计数（用户自己可见）
    console.log('当前网站访问次数：', visitCount);
});
</script>
